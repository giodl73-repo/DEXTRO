history:
  - stage: draft
    date: "2026-05-03"
    note: "Paper drafted from plan.md and empirical data. 6 sections. 2020 baseline complete (44 states). 2000 sweep 47/50 states. 2010 [TBD]. CSS framework defined. Lorenz drift proxy. Legal theory: CSS >= 0.90 as geographic determinism anchor."
  - stage: panel
    round: 1
    date: "2026-05-02"
    avg_score: 2.8
    note: "Round 1 panel reviews. 5 reviewers: Rodden 3, Duchin 3, Liang 2, Polikarpova 3, Grimmer 3. Avg 2.8/4. P1 consensus: (1) s_seat uncomputable without 2000/2010 election data — CSS formula overstates what data supports; (2) 5% threshold unjustified, no sensitivity analysis; (3) Iowa instability unexplained mechanistically; (4) legal theory is novel, not established doctrine. Percy Liang outlier at 2/4: sample size and threshold concerns."
  - stage: recheck
    round: 2
    date: "2026-05-02"
    avg_score: 3.1
    note: "Round 2 panel reviews. 5 reviewers: Rodden 3.5, Duchin 3.0, Liang 3.0, Polikarpova 3.0, Grimmer 3.0. Avg 3.1/4. R2 consensus: Iowa Hypothesis A/B case study and threshold sensitivity (15/20/23/26) are genuine improvements. s_seat clarification (MT/TX/NY as structurally changed, not unstable) resolves definitional inconsistency. Jaccard Hungarian algorithm pseudocode resolves Polikarpova's injectivity concern. Remaining gaps: (1) p*_2000 for Iowa still projected not computed; (2) Wilson CI on 20/30 still missing (Liang); (3) Proposition 1 still unproved, C_pop undefined; (4) Type I/Type II decomposition not executed; (5) null hypothesis absent. Rodden moves to 3.5 — would accept pending p* computation. Others maintain 3.0."
series: B
series_number: 15
