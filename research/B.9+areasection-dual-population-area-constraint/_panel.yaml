p1_items:
  - id: P1-A
    desc: "Lorenz condition: necessary not sufficient — fix language in §3.2"
    status: resolved
    resolution: "Added Remark after Proposition 3.1 explicitly stating necessary-not-sufficient. Replaced 'feasible ratios' with 'Lorenz-feasible ratios' throughout."
  - id: P1-B
    desc: "Replace 'enforces area balance' with precise soft-constraint language"
    status: resolved
    resolution: "Replaced 'enforces' with 'targets'/'penalises deviations from'. Added paragraph explaining population ubvec [1.001] takes priority when constraints conflict."
  - id: P1-C
    desc: "Add contiguity guarantee statement (or lack thereof)"
    status: resolved
    resolution: "Added Contiguity paragraph in §3.4: ncon paths do not set Contig option; contiguity is empirically reliable for planar graphs, not algorithmically guaranteed."
  - id: P1-D
    desc: "Normative reframing: 'geographic fairness' → 'geometric regularity'"
    status: resolved
    resolution: "Renamed §5.1 to 'AreaSection as a Geometric Regularity Mechanism'. Added paragraph explaining why 'fairness' is imprecise; the algorithm changes bisection structure not legal-standard fairness."
  - id: P1-E
    desc: "Competitiveness reduction: take a position on benefit vs cost"
    status: resolved
    resolution: "Added explicit bidirectional analysis in §5.1: competitive districts are valuable; stability is not unambiguously better; designers should consider both dimensions."
  - id: P1-F
    desc: "Expand head-to-head to all 34 comparable states (Liang P1-I)"
    status: resolved
    resolution: "§4.3 now reports 34-state comparison: 25/34 same (76%), 9 differ by ±1 seat, net -1 D seat under AreaSection with no systematic direction."
  - id: P1-G
    desc: "NC seat count was wrong in draft — update"
    status: resolved
    resolution: "NC corrected: GeoSection 5D, AreaSection 6D (not 5/5 as stated in draft). NC is now the clearest case where AreaSection helps Democrats."
