p1_items:
  - id: P1.1
    title: Partisan Outcome Analysis
    description: Compute efficiency gap, mean-median, partisan symmetry, seats-votes curves for all 50 states
    reviewers: [Moon Duchin, Jowei Chen]
    severity: blocking
    addressed: true
    completion:
      date: 2026-02-07
      commit: 6bf22ff
      files:
        - sections/results.tex (new subsection: Partisan Outcome Analysis)
        - tables/partisan_comparison_table.tex (10 representative states)
        - tables/partisan_improvement_summary.tex (national statistics)
        - scripts/political/*.py (5 analysis scripts)
      notes: |
        Added comprehensive partisan metrics analysis with 3 standard metrics:
        efficiency gap, mean-median difference, partisan bias. Results show
        mixed outcomes (54% states improved on MMD, 36% on EG, 14% on bias),
        demonstrating that compactness ≠ fairness due to geographic sorting.
        Added 8 new citations. Acknowledged limitations of synthetic data and
        suggested future work with real tract-level voting data.
  - id: P1.2
    title: VRA Compliance Evaluation
    description: Count majority-minority districts, discuss VRA vs compactness tradeoffs
    reviewers: [Moon Duchin, Jowei Chen]
    severity: blocking
    addressed: true
    completion:
      date: 2026-02-07
      commit: b527008
      files:
        - sections/results.tex (new subsection: Voting Rights Act Compliance)
        - tables/vra_compliance_table.tex (state-by-state comparison)
        - tables/vra_summary_table.tex (national statistics)
        - scripts/demographic/*.py (3 analysis scripts)
      notes: |
        Added comprehensive VRA compliance analysis showing 68% reduction in
        majority-minority districts (65 enacted -> 21 algorithmic). Demonstrates
        fundamental VRA-compactness tradeoff: geographic optimization conflicts
        with minority representation when populations are concentrated. Proposes
        3 solutions: hybrid objectives, protected communities, post-hoc adjustment.
        9 states non-compliant, including AL, AZ, CA, GA, LA, MD, NC, SC, TX.
  - id: P1.3
    title: Partitioning Quality Analysis
    description: Report edge-cut values, coarsening statistics, convergence behavior
    reviewers: [George Karypis, Ümit Çatalyürek, Bruce Hendrickson]
    severity: blocking
    addressed: true
    completion:
      date: 2026-02-07
      commit: 43228dc
      files:
        - sections/results.tex (new subsection: Partitioning Quality Analysis)
        - tables/partition_quality_table.tex (state-by-state metrics)
        - tables/partition_summary_table.tex (national averages)
        - scripts/analysis/*.py (2 analysis scripts)
      notes: |
        Added comprehensive METIS partitioning quality analysis demonstrating
        topological vs geometric tradeoff. Edge cuts increase 77% but perimeter
        decreases 25%, average edge length drops 66%. Explains METIS behavior
        (coarsening, refinement) and why geometric optimization succeeds for
        redistricting. Key insight: cutting 5 short urban edges (1 km each) is
        better than 1 long rural edge (20 km) for compactness.
  - id: P1.4
    title: Alternative Partitioner Comparison
    description: Compare to KaHIP/Scotch/Zoltan on 3-5 states
    reviewers: [George Karypis, Ümit Çatalyürek, Bruce Hendrickson]
    severity: blocking
    addressed: true
    completion:
      date: 2026-02-07
      commit: e70ddf7
      files:
        - sections/results.tex (new subsection: Generalization to Alternative Partitioners)
        - tables/partitioner_comparison_table.tex (5-state comparison)
        - scripts/analysis/*.py (2 comparison scripts)
      notes: |
        Compared METIS vs KaHIP vs Scotch on 5 representative states. All three
        achieve similar compactness (within 0.3% average, max deviation 1.86%).
        Demonstrates edge weighting generalizes across partitioners, not METIS-
        specific. Justifies METIS choice (maturity, ease of use) while showing
        technique is portable to other multilevel graph partitioners.
  - id: P1.5
    title: Recursive Bisection Justification
    description: Compare recursive to direct k-way METIS, justify choice
    reviewers: [George Karypis, Ümit Çatalyürek, Bruce Hendrickson, Cynthia Phillips]
    severity: blocking
    addressed: true
    completion:
      date: 2026-02-07
      commit: 61b5113
      files:
        - sections/methodology.tex (added justification after algorithm)
        - scripts/analysis/compare_recursive_kway.py (comparison script)
      notes: |
        Compared recursive bisection vs k-way on 10 states. K-way 1.7% better
        compactness but 20% contiguity failure rate. Recursive guarantees 100%
        contiguity, 1.7x faster, hierarchical structure. Justified choice:
        contiguity is absolute legal requirement, robustness trumps marginal
        quality gains. For redistricting, 100% contiguity > 1.7% compactness.
  - id: P1.6
    title: Soften Neutrality Claims
    description: Replace "partisan neutrality" with "political blindness", distinguish compactness from fairness
    reviewers: [Moon Duchin, Jowei Chen]
    severity: critical
    addressed: true
    completion:
      date: 2026-02-07
      commit: 2b13b7a
      files:
        - main.tex (abstract updated with compactness ≠ fairness caveat)
        - sections/introduction.tex (algorithmic objectivity, political blindness)
        - sections/discussion.tex (three-part neutrality taxonomy, geometric baseline)
        - sections/conclusion.tex (political blindness, Section 3.2 caveat)
      notes: |\
        Updated language throughout paper to distinguish three types of neutrality:
        (1) Algorithmic neutrality - uses no political data
        (2) Political blindness - cannot favor parties
        (3) Partisan neutrality - equal outcomes (NOT GUARANTEED)
        Key changes: "partisan neutrality" → "political blindness", "neutral baseline"
        → "geometric baseline", removed "implicitly promotes fairness" claims.
        Added caveats that compactness optimization resists intentional gerrymandering
        but cannot eliminate geographic sorting effects.
p2_items:
  - id: P2.1
    title: Approximation Analysis / Optimality Bounds
    description: MILP solutions for small states, lower bounds, approximation ratios
    reviewers: [Bruce Hendrickson, Cynthia Phillips]
    severity: important
    addressed: false
  - id: P2.2
    title: Multi-Objective Formulation
    description: Weighted objectives (compactness + county preservation + VRA), Pareto frontiers
    reviewers: [Moon Duchin, Jowei Chen, Michael Goodchild]
    severity: important
    addressed: false
  - id: P2.3
    title: MCMC Ensemble Comparison
    description: Run MCMC ensembles for 3-5 states, compare algorithmic plans to distributions
    reviewers: [Jowei Chen, Moon Duchin]
    severity: important
    addressed: false
  - id: P2.4
    title: County Preservation Analysis
    description: Measure county splits, compare to enacted, show compactness-county tradeoff
    reviewers: [Jowei Chen, Michael Goodchild]
    severity: important
    addressed: true
    completion:
      date: 2026-02-07
      commit: b2c6d68
      files:
        - sections/results.tex (new subsection: County Preservation Analysis)
        - tables/county_preservation_table.tex (10 representative states)
        - tables/county_preservation_summary.tex (national statistics for 2,636 counties)
        - scripts/analysis/compute_county_preservation.py (analysis script)
        - scripts/analysis/create_county_preservation_tables.py (table generation)
      notes: |\
        Added quantitative analysis of compactness-county preservation tradeoff.
        Key findings: modest increase in county splits (28.4% vs 27.4%, +1.0pp),
        strong negative correlation (-0.68) between splits and compactness gains.
        Only 4 states show clear tradeoff (>3 splits for >5% compactness). Indiana
        case study demonstrates human commission can achieve both objectives
        simultaneously (0.478 compactness, 32% split rate). Concludes tradeoff is
        real but modest - objectives are largely compatible. Recommends multi-
        objective formulation for states prioritizing county preservation.
  - id: P2.5
    title: Geographic Sorting Quantification
    description: Separate unavoidable geographic partisan effects from intentional gerrymandering
    reviewers: [Moon Duchin, Jowei Chen]
    severity: important
    addressed: true
    completion:
      date: 2026-02-07
      commit: cef75e6
      files:
        - sections/results.tex (new subsection: Geographic Sorting Quantification)
        - tables/geographic_sorting_table.tex (10 representative states)
        - tables/geographic_sorting_summary.tex (national statistics)
        - scripts/political/compute_geographic_sorting.py (analysis script)
        - scripts/political/create_geographic_sorting_tables.py (table generation)
      notes: |\
        Added quantitative analysis separating geographic baseline partisan effects
        from gerrymandering premium. Key findings: 60% of states are geography-
        dominated (>60% of bias is unavoidable), 26% are gerrymandering-dominated
        (<30% geographic). Average geographic fraction: 63% - two-thirds of partisan
        bias would persist even with perfectly compact districts. Provides objective
        metric for courts/legislatures to evaluate gerrymandering claims. Clarifies
        relationship between compactness and partisan fairness from Section 3.2.
  - id: P2.6
    title: Indiana Case Study Deep Dive
    description: Investigate commission process achieving 0.478 compactness, reverse-engineer approach
    reviewers: [Jowei Chen, George Karypis]
    severity: important
    addressed: false
  - id: P2.7
    title: Census Tract Boundary Limitations
    description: Discuss embedded biases, compare tract vs block level for pilot states
    reviewers: [Michael Goodchild]
    severity: important
    addressed: false
  - id: P2.8
    title: Hypergraph Formulation Exploration
    description: Compare hypergraph partitioning (PaToH, Zoltan) on 2-3 states
    reviewers: [Ümit Çatalyürek]
    severity: important
    addressed: false
