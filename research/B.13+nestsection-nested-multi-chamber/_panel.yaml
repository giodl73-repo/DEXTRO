          - 30-50% variance reduction estimate in Future Work is unsupported — should be removed or qualified
      - reviewer: Shang-Hua Teng
        score: 3
        recommendation: "Accept with Revisions"
        file: reviews/REVIEW-shang-hua-teng.md
