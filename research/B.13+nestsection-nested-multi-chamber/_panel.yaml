reviews:
  round: 1
  avg_score: 2.6
  scores:
    - reviewer: George Karypis
      expertise: graph-partitioning, METIS, tree structures
      score: 3
      recommendation: "Accept with Major Revisions"
      file: reviews/REVIEW-george-karypis.md
      key_issues:
        - Trunk sequence ordering not geometrically canonical — different orderings yield different geographic spines
        - NestSection (Alg. 2) assumes uniform seat allocation per trunk region — needs bridge argument from population balance
        - No empirical timing data for trunk-level GeoSection cost claim
        - NestRefine boundary-zone assignment rule underspecified (needs Algorithm 3)
    - reviewer: Moon Duchin
      expertise: redistricting-mathematics, ensemble-methods, election-law
      score: 2
      recommendation: "Major Revision"
      file: reviews/REVIEW-moon-duchin.md
      key_issues:
        - Anti-gerrymandering claim stated but not empirically tested (ensemble comparison missing)
        - No constitutional hook for cross-chamber mandate identified or developed
        - 11/50 headline dominated by 7 trivially compatible C=1 states — should be restated
        - Mode 2 has zero empirical instances — either justify or remove from taxonomy
    - reviewer: Richard Pildes
      expertise: constitutional-law, election-law, Art-I-redistricting-doctrine
      score: 2
      recommendation: "Major Revision"
      file: reviews/REVIEW-richard-pildes.md
      key_issues:
        - Elections Clause (Art. I §4) problem unengaged — can state mandate bind congressional map?
        - Art. I §2 hook mentioned in plan metadata but not developed in paper
        - Arizona/Indiana house-in-senate precedent barely mentioned — strongest existing legal analog
        - No engagement with judicial enforceability of the proposed spine-sharing mandate
    - reviewer: Percy Liang
      expertise: empirical-evaluation, benchmarking, ML-systems
      score: 3
      recommendation: "Accept with Revisions"
      file: reviews/REVIEW-percy-liang.md
      key_issues:
        - Bimodality finding deserves formal lemma/theorem not just a paragraph explanation
        - n=11 dominated by trivial C=1 states — need to stratify trivially/weakly/meaningfully compatible
        - No geographic maps despite implemented algorithm — Figure 1 is a placeholder box
        - 30-50% variance reduction estimate in Future Work is unsupported — should be removed or qualified
    - reviewer: Shang-Hua Teng
      expertise: theoretical-CS, combinatorial-optimization, smoothed-analysis, graph-algorithms
      score: 3
      recommendation: "Accept with Revisions"
      file: reviews/REVIEW-shang-hua-teng.md
      key_issues:
        - Prop. 1(3) optimality claim is weaker than it appears — canonical ordering is not unique maximizer of shared prefix
        - Complexity claim conflates operation count with algorithmic cost (n not stated)
        - Mode 3 optimization under tau_pop budget is an open problem — hardness not characterized
        - No sensitivity analysis of sigma to +/-1 apportionment changes
venue_target: Harvard Journal on Legislation
