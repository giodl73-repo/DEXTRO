revision_history:
  - round: 1
    date: 2026-05-02
    avg_score_before: 2.6
    items_addressed:
      - "P1-1: Bimodality Gap theorem (Theorem 3) added to §3 after score definition, with full proof and remark"
      - "P1-2: §4 restructured — trivially compatible (C=1, 7 states) vs weakly compatible (C=2, 2 states) vs non-trivially compatible (OR/AL) distinction added; headline 11-state count caveated"
      - "P1-3: New subsection §4.3 (Oregon and Alabama) with geographic spine descriptions and figure environments for both states"
