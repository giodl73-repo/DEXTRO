keywords:
  - redistricting
  - multi-chamber consistency
  - factorization spine
  - gerrymandering
  - hierarchical bisection
  - apportionment
  - compatible factorization
implementation:
  crate: redist-apportion
  module: nest
  functions:
    - compatible_spines
    - spine_compatibility_score
    - us_state_compatibility_table
empirical_status: theoretical  # awaiting pipeline run on census geography
notes: >
  50-state compatibility census complete (theoretical, from nest.rs data).
  11 strictly compatible states (sigma=0), 39 structurally incompatible.
  Case studies: OR (perfect), NC (Mode 3, sigma=85.7%), TX (fully incompatible, sigma=96.8%).
  Empirical validation (running NestSection on actual census tracts) deferred.
