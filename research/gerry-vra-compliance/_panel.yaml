p1_items:
  - id: P1.1
    title: "Clarify VRA Compliance vs. Demographic Precondition"
    description: "Replace 'VRA compliance' language with 'Gingles prong 1 satisfaction' or 'demographic viability'. Add caveats that full Section 2 compliance requires political cohesion and bloc voting analysis (prongs 2-3)."
    addressed: true
    resolution: "Reframed throughout as 'demographic viability' and 'Gingles prong 1 satisfaction'. Added caveats in Introduction and Conclusion clarifying that full Section 2 compliance requires additional analysis."
  - id: P1.2
    title: "Add Comparison to Enacted 2020 Plans"
    description: "Download enacted 2020 congressional plans, compare MM district counts, minority percentages, and compactness metrics. Add comparison table showing algorithmic vs. enacted performance."
    addressed: true
    resolution: "Added Table 3 comparing enacted vs. algorithmic plans across all 5 states. Edge-weighted plans achieve 4 MM districts vs. 3 in enacted plans (Alabama +1, Louisiana +1 compared to enacted)."
  - id: P1.3
    title: "Add Constitutional Analysis (Race as Predominant Factor)"
    description: "Add section discussing Shaw/Miller/Cooper strict scrutiny framework. Analyze whether edge-weighting makes race 'predominant factor' and whether it satisfies narrow tailoring requirement."
    addressed: true
    resolution: "Added new Section 2.3 (4 pages) analyzing Shaw/Miller/Cooper framework. Demonstrates edge-weighting uses race as input to compactness optimization, not predominant factor. Narrow tailoring via minimal weight factors."
  - id: P1.4
    title: "Engage with Allen v. Milligan (2023)"
    description: "Add Alabama case study subsection discussing Allen v. Milligan litigation. Compare edge-weighted plan to Allen remedial plan. Cite Allen throughout when discussing Alabama."
    addressed: true
    resolution: "Integrated Allen v. Milligan throughout. Added Background subsection on case, Alabama case study comparing algorithmic to remedial plan. Cited Allen when discussing 2 MM requirement."

