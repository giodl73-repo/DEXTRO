# Panel Review State - gerry-threshold-analysis
# Paper: The 42% Threshold - Geographic Limits of VRA Compliance

title: "The 42% Threshold: Geographic Limits of VRA Compliance Through Algorithmic Redistricting"
paper_type: "VRA Legal Threshold & Empirical Analysis"
venue: "Election Law Journal" # Target venue for VRA/legal analysis
stage: ready # Current stage in review lifecycle
round: 1 # Review round number

# Paper metadata
abstract_summary: "Identifies 42% state-level minority threshold for VRA compliance through comprehensive analysis of 43 states, 645 configurations. States >=42% minority achieve near-proportional representation (80-114% of target, 62% success rate), states <37% achieve 0% success. Statistical validation: r=0.78, p<1e-08 across diverse geographic contexts."

keywords:
  - "Voting Rights Act"
  - "majority-minority districts"
  - "algorithmic redistricting"
  - "feasibility threshold"
  - "Section 2 compliance"
  - "Thornburg v. Gingles"

# Reviewer assignments (selected based on paper type)
reviewers:
  - name: "Richard Pildes"
    affiliation: "NYU Law"
    expertise: "Election law, constitutional doctrine, VRA"
    rationale: "Primary VRA expert - will assess legal standards and Gingles prong 1 operationalization"

  - name: "Heather Gerken"
    affiliation: "Yale Law"
    expertise: "Election law, voting rights, federalism"
    rationale: "Legal scholar - will evaluate normative implications and policy framework"

  - name: "Moon Duchin"
    affiliation: "Rutgers"
    expertise: "Gerrymandering, metric geometry, fairness"
    rationale: "Mathematical rigor - will assess statistical methodology and threshold validity"

  - name: "Jonathan Rodden"
    affiliation: "Stanford"
    expertise: "Political geography, gerrymandering, representation"
    rationale: "Geographic clustering expert - will evaluate spatial autocorrelation analysis"

  - name: "Nicholas Stephanopoulos"
    affiliation: "Harvard Law"
    expertise: "Efficiency gap, partisan symmetry, legal standards"
    rationale: "Quantitative legal scholar - will assess empirical methodology and judicial applicability"

