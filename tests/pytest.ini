[pytest]
# Pytest configuration for pipeline test system

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
# Default: skip network-marked tests (they hit live external services).
# Run them explicitly: pytest -m network
addopts =
    -v
    --tb=short
    -m "not network"

# Warning filters
filterwarnings =
    error
    ignore::pytest.PytestUnknownMarkWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning
    ignore::UserWarning:geopandas
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::ResourceWarning

# Coverage
[coverage:run]
source = scripts
omit =
    tests/*
    scripts/tests/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Markers
markers =
    unit: Unit tests for individual scripts
    integration: Integration tests for multi-stage pipeline
    slow: Tests that take longer than 10 seconds
    redistricting: Tests for redistricting scripts
    political: Tests for political analysis scripts
    demographic: Tests for demographic analysis scripts
    compactness: Tests for compactness scripts
    visualization: Tests for visualization scripts
    aggregation: Tests for aggregation scripts
    mock: Tests using mock data only
    network: Tests that require live network access (Dataverse, GitHub, etc.); skipped by default — run with `pytest -m network`

# Timeouts
timeout = 300
timeout_method = thread
