name: Pipeline Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
    env:
      REDIST_NO_RUST: "1"   # Rust not compiled in this job; pure-Python path used

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install METIS (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get install -y metis

    - name: Run unit tests
      run: |
        python -m pytest tests/unit -v --tb=short --cov=apportionment --cov-report=xml --cov-report=term

    # Integration tests require actual pipeline outputs (outputs/V3/) which are
    # gitignored and only exist locally after running the redistricting pipeline.
    # Run them locally with: pytest tests/integration -v

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  rust-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: redist

    - name: Install METIS
      run: sudo apt-get install -y libmetis-dev

    - name: Test redist-core
      run: cargo test -p redist-core --lib --tests
      working-directory: redist

    - name: Test redist-data
      run: cargo test -p redist-data --lib --tests
      working-directory: redist

    - name: Test redist-analysis
      run: cargo test -p redist-analysis --lib --tests
      working-directory: redist

    - name: Test redist-apportion
      run: cargo test -p redist-apportion --lib --tests
      working-directory: redist

    - name: Test redist-map
      run: cargo test -p redist-map --lib --tests
      working-directory: redist

    - name: Test redist-report
      run: cargo test -p redist-report --lib --tests
      working-directory: redist

    - name: Test redist-cli (serialised)
      run: cargo test -p redist-cli --lib --tests -- --test-threads=1
      working-directory: redist

  test-e2e:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      run: |
        python -m playwright install chromium

    - name: Generate test data
      run: |
        python -c "
        from tests.mocks.mock_tracts import generate_mock_tracts
        from tests.mocks.mock_districts import generate_mock_districts
        from tests.mocks.mock_analysis import generate_mock_political_analysis, generate_mock_demographic_analysis, generate_mock_compactness_analysis
        from tests.mocks.mock_maps import generate_mock_state_map, generate_mock_national_map
        from pathlib import Path

        # Generate test data
        output_dir = Path('outputs/test_2020_ci')
        output_dir.mkdir(parents=True, exist_ok=True)

        # Generate small dataset for CI
        tracts = generate_mock_tracts(num_tracts=50, state='vermont', year='2020')
        districts = generate_mock_districts(tracts, num_districts=1)

        # Generate analysis
        political = generate_mock_political_analysis(districts, state='vermont')
        demographics = generate_mock_demographic_analysis(districts)
        compactness = generate_mock_compactness_analysis(districts)

        # Save CSVs
        (output_dir / 'csvs').mkdir(exist_ok=True)
        political.to_csv(output_dir / 'csvs' / 'political.csv', index=False)
        demographics.to_csv(output_dir / 'csvs' / 'demographics.csv', index=False)
        compactness.to_csv(output_dir / 'csvs' / 'compactness.csv', index=False)

        # Generate maps
        (output_dir / 'maps').mkdir(exist_ok=True)
        generate_mock_state_map(output_dir / 'maps' / 'districts.png', state='vermont', map_type='districts')
        generate_mock_national_map(output_dir / 'maps' / 'national.png', map_type='districts')

        print('[OK] Test data generated for CI')
        "

    - name: Run E2E tests
      run: |
        python -m pytest tests/e2e -v --tb=short

    - name: Upload test artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-artifacts-${{ matrix.os }}
        path: |
          tests/e2e/screenshots/
          tests/e2e/videos/
