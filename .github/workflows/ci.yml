name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: redist

      - name: Install METIS (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libmetis-dev

      - name: Install METIS (macOS)
        if: runner.os == 'macOS'
        run: brew install metis

      # ── Per-crate test steps ──────────────────────────────────────────────
      # Breaking by crate gives clear attribution when a crate's tests fail
      # and lets each crate's --lib + --tests run together.
      # redist-cli runs last with --test-threads=1 because its inline tests
      # call set_current_dir() (process-global); parallel execution races → ENOENT.

      - name: Test redist-metis
        run: cargo test -p redist-metis --lib --tests
        working-directory: redist

      - name: Test redist-core
        run: cargo test -p redist-core --lib --tests
        working-directory: redist

      - name: Test redist-data
        run: cargo test -p redist-data --lib --tests
        working-directory: redist

      - name: Test redist-analysis
        run: cargo test -p redist-analysis --lib --tests
        working-directory: redist

      - name: Test redist-apportion
        run: cargo test -p redist-apportion --lib --tests
        working-directory: redist

      - name: Test redist-map
        run: cargo test -p redist-map --lib --tests
        working-directory: redist

      - name: Test redist-report
        run: cargo test -p redist-report --lib --tests
        working-directory: redist

      - name: Test redist-cli (serialised — CWD-sensitive inline tests)
        # --lib  : inline #[cfg(test)] modules (label_cmd, run_registry, …)
        # --tests: integration test files (spec7_pipeline_l2 is all #[ignore])
        run: cargo test -p redist-cli --lib --tests -- --test-threads=1
        working-directory: redist

  build:
    name: Build release (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: redist-linux
            bins: |
              redist/target/release/redist
              redist/target/release/redist-tui
          - os: windows-latest
            artifact: redist-windows
            bins: |
              redist/target/release/redist.exe
              redist/target/release/redist-tui.exe
          - os: macos-latest
            artifact: redist-macos
            bins: |
              redist/target/release/redist
              redist/target/release/redist-tui
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: redist

      - name: Build release binaries
        run: cargo build --release -p redist-cli -p redist-tui
        working-directory: redist

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bins }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            redist-linux/redist
            redist-linux/redist-tui
            redist-windows/redist.exe
            redist-windows/redist-tui.exe
            redist-macos/redist
            redist-macos/redist-tui
          generate_release_notes: true
