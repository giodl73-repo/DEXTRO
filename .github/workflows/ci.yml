name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: redist

      - name: Install METIS (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libmetis-dev

      - name: Install METIS (macOS)
        if: runner.os == 'macOS'
        run: brew install metis

      - name: Run tests (workspace, excluding redist-cli)
        # Exclude redist_py (Python dev headers), redist-web (stub), and
        # redist-cli (run separately below with --test-threads=1).
        run: cargo test --workspace --lib --exclude redist_py --exclude redist-web --exclude redist-cli
        working-directory: redist

      - name: Run tests (redist-cli — serialised)
        # label_cmd.rs tests use set_current_dir(), which is process-global.
        # Running them in parallel races on CWD → ENOENT.  Single-threaded is safe.
        run: cargo test -p redist-cli --lib -- --test-threads=1
        working-directory: redist

  build:
    name: Build release (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: redist-linux
            bins: |
              redist/target/release/redist
              redist/target/release/redist-tui
          - os: windows-latest
            artifact: redist-windows
            bins: |
              redist/target/release/redist.exe
              redist/target/release/redist-tui.exe
          - os: macos-latest
            artifact: redist-macos
            bins: |
              redist/target/release/redist
              redist/target/release/redist-tui
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: redist

      - name: Build release binaries
        run: cargo build --release -p redist-cli -p redist-tui
        working-directory: redist

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bins }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            redist-linux/redist
            redist-linux/redist-tui
            redist-windows/redist.exe
            redist-windows/redist-tui.exe
            redist-macos/redist
            redist-macos/redist-tui
          generate_release_notes: true
