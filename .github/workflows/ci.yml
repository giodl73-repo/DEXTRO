name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

jobs:
  # ---------------------------------------------------------------------------
  # Engine: c-ffi  (C METIS FFI via libmetis — default production engine)
  # Requires libmetis installed.  Runs on Linux + macOS (Windows TBD).
  # ---------------------------------------------------------------------------
  test-engine-c-ffi:
    name: Test / c-ffi engine (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: redist
          key: c-ffi

      - name: Install METIS (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libmetis-dev

      - name: Install METIS (macOS)
        if: runner.os == 'macOS'
        run: brew install metis

      # All crates except redist-cli run in parallel (no CWD issue).
      - name: Test redist-metis
        run: cargo test -p redist-metis --lib --tests
        working-directory: redist

      - name: Test redist-core
        run: cargo test -p redist-core --lib --tests
        working-directory: redist

      - name: Test redist-data
        run: cargo test -p redist-data --lib --tests
        working-directory: redist

      - name: Test redist-analysis
        run: cargo test -p redist-analysis --lib --tests
        working-directory: redist

      - name: Test redist-apportion (c-ffi engine — requires libmetis)
        run: cargo test -p redist-apportion --lib --tests
        working-directory: redist

      - name: Test redist-map
        run: cargo test -p redist-map --lib --tests
        working-directory: redist

      - name: Test redist-report
        run: cargo test -p redist-report --lib --tests
        working-directory: redist

      # redist-cli runs last with --test-threads=1: set_current_dir() is
      # process-global; parallel tests race on CWD → ENOENT.
      - name: Test redist-cli (c-ffi engine, serialised)
        run: cargo test -p redist-cli --lib --tests -- --test-threads=1
        working-directory: redist

  # ---------------------------------------------------------------------------
  # Engine: redist-metis  (pure-Rust METIS — no C dependency)
  # No libmetis required.  Runs on all three platforms including Windows.
  # ---------------------------------------------------------------------------
  test-engine-redist-metis:
    name: Test / redist-metis engine (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      # Tell redist-apportion tests to use the pure-Rust engine.
      REDIST_METIS_ENGINE: redist-metis
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: redist
          key: redist-metis

      # No METIS install step — that is the whole point of this job.

      - name: Test redist-metis (pure-Rust engine — no C dep)
        run: cargo test -p redist-metis --lib --tests
        working-directory: redist

      - name: Test redist-core
        run: cargo test -p redist-core --lib --tests
        working-directory: redist

      - name: Test redist-data
        run: cargo test -p redist-data --lib --tests
        working-directory: redist

      - name: Test redist-analysis
        run: cargo test -p redist-analysis --lib --tests
        working-directory: redist

      # redist-apportion links C METIS unconditionally (MetisEngine::CFfi is
      # used in the default MetisPartitioner::default()).  On this job we have
      # no libmetis, so skip redist-apportion — its pure-Rust path is covered
      # by the redist-metis crate tests above.
      # TODO: add a Cargo feature that makes the C METIS dependency optional so
      # redist-apportion can be tested with --features redist-metis-only.

      - name: Test redist-map
        run: cargo test -p redist-map --lib --tests
        working-directory: redist

      - name: Test redist-report
        run: cargo test -p redist-report --lib --tests
        working-directory: redist

      - name: Test redist-cli (redist-metis engine, serialised)
        # redist-apportion is a dependency of redist-cli, so this build still
        # links C METIS.  On windows-latest this may fail if libmetis is not
        # available — the matrix will surface that clearly.
        run: cargo test -p redist-cli --lib --tests -- --test-threads=1
        working-directory: redist
        continue-on-error: ${{ matrix.os == 'windows-latest' }}

  # ---------------------------------------------------------------------------
  # Release builds (tag-triggered only)
  # ---------------------------------------------------------------------------
  build:
    name: Build release (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: redist-linux
            bins: |
              redist/target/release/redist
              redist/target/release/redist-tui
          - os: windows-latest
            artifact: redist-windows
            bins: |
              redist/target/release/redist.exe
              redist/target/release/redist-tui.exe
          - os: macos-latest
            artifact: redist-macos
            bins: |
              redist/target/release/redist
              redist/target/release/redist-tui
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: redist

      - name: Install METIS (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libmetis-dev

      - name: Install METIS (macOS)
        if: runner.os == 'macOS'
        run: brew install metis

      - name: Build release binaries
        run: cargo build --release -p redist-cli -p redist-tui
        working-directory: redist

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bins }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            redist-linux/redist
            redist-linux/redist-tui
            redist-windows/redist.exe
            redist-windows/redist-tui.exe
            redist-macos/redist
            redist-macos/redist-tui
          generate_release_notes: true
