name: Formal Verification

# CI policy:
#   cargo test   — runs on every commit, blocks PR merge (see ci.yml)
#   cargo kani   — main/release only, too slow for every PR (~35-70 min)
#   cargo prusti — advisory on PR (continue-on-error: true), blocking on release tags
#
# Note: Kani/Prusti harnesses for the pure-Rust partitioning algorithm live in
# the standalone metis-core repo and are run by its own CI workflow.
# This file covers verification of redist-specific crates only.

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

jobs:
  # ---------------------------------------------------------------------------
  # Kani — bounded model checker for Rust
  # Runs only on push to main/master and release tags (NOT on PR commits).
  # ---------------------------------------------------------------------------
  kani:
    name: Kani model checking (redist workspace)
    # Skip this job entirely for pull_request events — Kani is main/release only.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Kani
        uses: model-checking/kani-github-action@v1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: redist
          key: kani

      - name: Run Kani harnesses (redist-apportion)
        run: cargo kani -p redist-apportion --no-default-features
        working-directory: redist

  # ---------------------------------------------------------------------------
  # Prusti — static verifier / postcondition checker for Rust
  # Advisory on PR (continue-on-error: true — never blocks merge).
  # ---------------------------------------------------------------------------
  prusti:
    name: Prusti static verification (redist workspace)
    runs-on: ubuntu-latest
    # advisory on PR/main-push; blocking on release tags (refs/tags/v*)
    continue-on-error: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Prusti
        run: |
          PRUSTI_VERSION="0.2.2"
          PRUSTI_URL="https://github.com/viperproject/prusti-dev/releases/download/v-${PRUSTI_VERSION}-2023-07-23/prusti-release-ubuntu.zip"
          if curl -sSfL "$PRUSTI_URL" -o /tmp/prusti.zip 2>/dev/null; then
            unzip -q /tmp/prusti.zip -d /tmp/prusti
            chmod +x /tmp/prusti/cargo-prusti /tmp/prusti/prusti-driver
            echo "/tmp/prusti" >> "$GITHUB_PATH"
            echo "PRUSTI_AVAILABLE=true" >> "$GITHUB_ENV"
          else
            echo "[WARN] Prusti release download failed (URL may be stale). Skipping verification."
            echo "       Update PRUSTI_VERSION in verify.yml when a new release is available."
            echo "PRUSTI_AVAILABLE=false" >> "$GITHUB_ENV"
          fi

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: redist
          key: prusti

      - name: Run Prusti (redist-apportion)
        if: env.PRUSTI_AVAILABLE == 'true'
        run: cargo prusti -p redist-apportion --no-default-features
        working-directory: redist
