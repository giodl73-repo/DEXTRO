name: Formal Verification

# CI policy:
#   cargo test   — runs on every commit, blocks PR merge (see ci.yml)
#   cargo kani   — main/release only, too slow for every PR (~35-70 min)
#   cargo prusti — advisory on PR (continue-on-error: true), blocking on release tags

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  # NOTE: Kani is intentionally NOT triggered on pull_request events.
  # A single Kani run takes 35–70 minutes; running it on every PR commit
  # would make CI unusable. Prusti runs on PR as an advisory check only.
  pull_request:
    branches: [main, master]

jobs:
  # ---------------------------------------------------------------------------
  # Kani — bounded model checker for Rust
  # Runs only on push to main/master and release tags (NOT on PR commits).
  # ---------------------------------------------------------------------------
  kani:
    name: Kani model checking (redist-metis)
    # Skip this job entirely for pull_request events — Kani is main/release only.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Kani
        uses: model-checking/kani-github-action@v1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: redist
          key: kani

      - name: Run Kani harnesses
        run: cargo kani --workspace -p redist-metis
        working-directory: redist

  # ---------------------------------------------------------------------------
  # Prusti — static verifier / postcondition checker for Rust
  # Advisory on PR (continue-on-error: true — never blocks merge).
  # TODO: Remove continue-on-error for release tags once harnesses are stable
  # and the Prusti job should become a hard gate at release time.
  # ---------------------------------------------------------------------------
  prusti:
    name: Prusti static verification (redist-metis)
    runs-on: ubuntu-latest
    # Advisory: never blocks PR merge. See policy note above.
    # To make this blocking on release tags, add a separate job scoped to
    # `if: startsWith(github.ref, 'refs/tags/v')` without continue-on-error.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Prusti
        run: |
          # Download the latest Prusti release for the current Rust toolchain.
          # Prusti ships its own toolchain pin via rust-toolchain.toml at
          # verification time; the install step fetches the matching binary.
          cargo install prusti-contracts --locked 2>/dev/null || true
          # Primary install path: Prusti release artifact
          PRUSTI_VERSION="0.2.2"
          curl -sSfL \
            "https://github.com/viperproject/prusti-dev/releases/download/v-${PRUSTI_VERSION}-2023-07-23/prusti-release-ubuntu.zip" \
            -o /tmp/prusti.zip
          unzip -q /tmp/prusti.zip -d /tmp/prusti
          chmod +x /tmp/prusti/cargo-prusti /tmp/prusti/prusti-driver
          echo "/tmp/prusti" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: redist
          key: prusti

      - name: Run Prusti
        run: cargo prusti -p redist-metis
        working-directory: redist
